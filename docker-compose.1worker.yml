version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: worldcup_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=worldcup_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/source:/tmp/source

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: worldcup_ingestion
    environment:
      - DATA_DIR=/data/source
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=worldcup_dw
    volumes:
      - ./data:/data
    depends_on:
      - db

volumes:
  postgres_data:
