version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: world_cup_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - dw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d world_cup_dw"]
      interval: 5s
      timeout: 5s
      retries: 10

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: world-cup-spark:3.5.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./scripts:/scripts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dw-network

  spark-worker-1:
    image: world-cup-spark:3.5.1
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: "1"
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8081:8081"
    volumes:
      - ./scripts:/scripts
    depends_on:
      - spark-master
    networks:
      - dw-network

  spark-worker-2:
    image: world-cup-spark:3.5.1
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: "1"
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8082:8081"
    volumes:
      - ./scripts:/scripts
    depends_on:
      - spark-master
    networks:
      - dw-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - node-exporter
      - postgres-exporter
    networks:
      - dw-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - dw-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://user:password@postgres:5432/world_cup_dw?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dw-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards/grafana:/var/lib/grafana/dashboards
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - postgres
      - prometheus
    networks:
      - dw-network

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: world-cup-python:3.9
    container_name: ingestion
    volumes:
      - ./scripts:/scripts
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dw-network

  fastapi:
    image: world-cup-python:3.9
    container_name: fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./scripts:/app
    working_dir: /app
    environment:
      DB_USER: user
      DB_PASSWORD: password
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: world_cup_dw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dw-network
    command: uvicorn api:app --host 0.0.0.0 --port 8000

networks:
  dw-network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
