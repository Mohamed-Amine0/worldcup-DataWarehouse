version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: worldcup_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=worldcup_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Permet de monter les fichiers CSV sources pour pouvoir les importer directement si besoin
      - ./data/source:/tmp/source
      # Permet d'importer automatiquement les données au démarrage
      - ./ingestion/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
